<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросник ДВССК</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header-bar {
            background: linear-gradient(180deg, #1a3e72 0%, #0d2b54 100%);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
        }

        .header-bar h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .content {
            padding: 30px;
        }

        h2 {
            color: #1a3e72;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            background: #00509e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            margin: 5px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #003d7a;
        }

        .btn-green {
            background: #2d7d46;
        }

        .btn-green:hover {
            background: #236636;
        }

        .btn-red {
            background: #c73e3e;
        }

        .btn-red:hover {
            background: #a33030;
        }

        .btn-gray {
            background: #5a6268;
        }

        .btn-gray:hover {
            background: #464c51;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            background: #f8f9fa;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00509e;
            box-shadow: 0 0 0 2px rgba(0, 80, 158, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 18px;
            margin: 12px 0;
        }

        .question-block {
            background: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 18px;
            margin: 12px 0;
        }

        .option-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 6px 8px;
            background: #f1f4f7;
            border-radius: 4px;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: #1a3e72;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .stat-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 14px;
        }

        .stat-table th {
            background: #1a3e72;
            color: white;
            padding: 10px 12px;
            text-align: left;
        }

        .stat-table td {
            padding: 8px 12px;
            border: 1px solid #dee2e6;
        }

        .stat-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .error {
            color: #c73e3e;
            text-align: center;
            margin: 12px 0;
            font-weight: 500;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
        }

        .hidden {
            display: none;
        }

        .actions {
            margin: 20px 0;
            text-align: center;
        }

        canvas {
            margin-top: 20px;
            max-height: 300px;
        }

        label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 50px;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .header-bar h1 {
                font-size: 18px;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-bar">
            <h1>ДВССК · Опросник</h1>
        </div>
        <div class="content" id="app">
            <div class="loading">Загрузка данных...</div>
        </div>
    </div>

    <script>
        // ====== НАСТРОЙКА FIREBASE ======
        const FIREBASE_URL = 'https://oprosnik-2fff5-default-rtdb.firebaseio.com/';

        // ====== ДАННЫЕ ======
        let DATA = { polls: [], questions: [], options: [], answers: [] };
        const ADMIN = { login: 'admin', password: 'admin123' };
        let currentUser = null;
        let currentScreen = 'login';

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ====== ЗАГРУЗКА/СОХРАНЕНИЕ В FIREBASE ======
        async function loadData() {
            try {
                const resp = await fetch(FIREBASE_URL + '.json');
                if (!resp.ok) throw new Error('Network error');
                const data = await resp.json();
                if (data && data.polls) {
                    DATA = data;
                } else {
                    DATA = { polls: [], questions: [], options: [], answers: [] };
                    await saveData();
                }
            } catch (e) {
                console.error('Ошибка загрузки:', e);
            }
        }

        async function saveData() {
            try {
                await fetch(FIREBASE_URL + '.json', {
                    method: 'PUT',
                    body: JSON.stringify(DATA)
                });
            } catch (e) {
                console.error('Ошибка сохранения:', e);
            }
        }

        // ====== РЕНДЕР ======
        function render() {
            const app = document.getElementById('app');
            switch (currentScreen) {
                case 'login': app.innerHTML = renderLogin(); break;
                case 'userDashboard': app.innerHTML = renderUserDashboard(); break;
                case 'takePoll': app.innerHTML = renderTakePoll(); break;
                case 'adminDashboard': app.innerHTML = renderAdminDashboard(); break;
                case 'createPoll': app.innerHTML = renderCreatePoll(); break;
                case 'statistics': app.innerHTML = renderStatistics(); break;
                case 'editPoll': app.innerHTML = renderEditPoll(); break;
            }
        }

        // ====== ЭКРАН ВХОДА ======
        function renderLogin() {
            return `
                <h2>Вход в систему</h2>
                <p class="subtitle">Введите логин. Для админа — логин и пароль.</p>
                <div id="loginError" class="error hidden"></div>
                <input type="text" id="loginInput" placeholder="Логин">
                <input type="password" id="passwordInput" placeholder="Пароль (только для админа)">
                <div class="actions">
                    <button class="btn" onclick="login()">Войти</button>
                </div>
            `;
        }

        window.login = function() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            if (!login) {
                errorDiv.textContent = 'Введите логин';
                errorDiv.classList.remove('hidden');
                return;
            }
            if (login === ADMIN.login) {
                if (password === ADMIN.password) {
                    currentUser = { login: login, role: 'admin' };
                    currentScreen = 'adminDashboard';
                } else {
                    errorDiv.textContent = 'Неверный пароль администратора';
                    errorDiv.classList.remove('hidden');
                    return;
                }
            } else {
                currentUser = { login: login, role: 'user' };
                currentScreen = 'userDashboard';
            }
            errorDiv.classList.add('hidden');
            render();
        };

        // ====== ДАШБОРД ПОЛЬЗОВАТЕЛЯ ======
        function renderUserDashboard() {
            const activePolls = DATA.polls.filter(p => p.status === 'active');
            const userAnswers = DATA.answers.filter(a => a.userLogin === currentUser.login);
            const answeredPollIds = new Set(userAnswers.map(a => a.pollId));
            let html = `
                <div class="header">
                    <span>Пользователь: <strong>${escapeHtml(currentUser.login)}</strong></span>
                    <button class="btn btn-gray" onclick="logout()">Выйти</button>
                </div>
                <h2>Доступные опросы</h2>
            `;
            if (activePolls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет активных опросов</p>';
            } else {
                activePolls.forEach(poll => {
                    const done = answeredPollIds.has(poll.id);
                    html += `
                        <div class="card">
                            <strong>${escapeHtml(poll.title)}</strong>
                            <p style="color:#666;font-size:13px;margin-top:5px;">${escapeHtml(poll.description || '')}</p>
                            ${done 
                                ? '<span style="color:#888;font-weight:500;">Пройдено</span>'
                                : `<button class="btn" onclick="startPoll('${poll.id}')">Пройти</button>`
                            }
                        </div>
                    `;
                });
            }
            return html;
        };

        window.startPoll = function(pollId) {
            currentScreen = 'takePoll';
            window._pollId = pollId;
            render();
        };

        // ====== ПРОХОЖДЕНИЕ ОПРОСА ======
        function renderTakePoll() {
            const pollId = window._pollId;
            const poll = DATA.polls.find(p => p.id === pollId);
            if (!poll) return '<p>Опрос не найден</p>';
            const questions = DATA.questions.filter(q => q.pollId === pollId);
            let html = `
                <div class="header">
                    <button class="btn btn-gray" onclick="goTo('userDashboard')">← Назад</button>
                </div>
                <h2>${escapeHtml(poll.title)}</h2>
                <p style="color:#555;margin-bottom:20px;">${escapeHtml(poll.description || '')}</p>
                <div id="pollError" class="error hidden"></div>
                <form id="pollForm">
            `;
            questions.forEach((q, qi) => {
                html += `<div class="question-block"><p style="font-weight:600;color:#1a3e72;margin-bottom:12px;">${qi+1}. ${escapeHtml(q.questionText)}</p>`;
                if (q.questionType === 'text') {
                    html += `<textarea name="q_${q.id}" placeholder="Ваш ответ"></textarea>`;
                } else {
                    const options = DATA.options.filter(o => o.questionId === q.id);
                    const inputType = q.questionType === 'single' ? 'radio' : 'checkbox';
                    const name = q.questionType === 'single' ? `q_${q.id}` : `q_${q.id}[]`;
                    options.forEach(opt => {
                        html += `
                            <label class="option-row">
                                <span class="option-letter">${opt.optionLetter}</span>
                                <input type="${inputType}" name="${name}" value="${opt.id}">
                                ${escapeHtml(opt.optionText)}
                            </label>
                        `;
                    });
                }
                html += '</div>';
            });
            html += `
                    <div class="actions">
                        <button type="button" class="btn btn-green" onclick="submitPoll('${pollId}')">Отправить ответы</button>
                    </div>
                </form>
            `;
            return html;
        }

        window.submitPoll = async function(pollId) {
            const errorDiv = document.getElementById('pollError');
            const questions = DATA.questions.filter(q => q.pollId === pollId);
            let hasError = false;
            questions.forEach(q => {
                if (q.questionType === 'text') {
                    if (!document.querySelector(`[name="q_${q.id}"]`)?.value.trim()) hasError = true;
                } else if (q.questionType === 'single') {
                    if (!document.querySelector(`[name="q_${q.id}"]:checked`)) hasError = true;
                } else if (q.questionType === 'multiple') {
                    if (document.querySelectorAll(`[name="q_${q.id}\\[\\]"]:checked`).length === 0) hasError = true;
                }
            });
            if (hasError) {
                errorDiv.textContent = 'Ответьте на все вопросы';
                errorDiv.classList.remove('hidden');
                return;
            }
            questions.forEach(q => {
                if (q.questionType === 'text') {
                    const val = document.querySelector(`[name="q_${q.id}"]`)?.value.trim();
                    DATA.answers.push({ id: generateId(), pollId, questionId: q.id, userLogin: currentUser.login, optionId: null, textAnswer: val, submittedAt: new Date().toISOString() });
                } else if (q.questionType === 'single') {
                    const checked = document.querySelector(`[name="q_${q.id}"]:checked`);
                    DATA.answers.push({ id: generateId(), pollId, questionId: q.id, userLogin: currentUser.login, optionId: checked.value, textAnswer: null, submittedAt: new Date().toISOString() });
                } else if (q.questionType === 'multiple') {
                    document.querySelectorAll(`[name="q_${q.id}\\[\\]"]:checked`).forEach(cb => {
                        DATA.answers.push({ id: generateId(), pollId, questionId: q.id, userLogin: currentUser.login, optionId: cb.value, textAnswer: null, submittedAt: new Date().toISOString() });
                    });
                }
            });
            await saveData();
            alert('Ответы приняты!');
            goTo('userDashboard');
        };

        // ====== АДМИН-ПАНЕЛЬ ======
        function renderAdminDashboard() {
            const polls = DATA.polls;
            let html = `
                <div class="header">
                    <span>Администратор: <strong>${escapeHtml(currentUser.login)}</strong></span>
                    <button class="btn btn-gray" onclick="logout()">Выйти</button>
                </div>
                <h2>Управление опросами</h2>
                <div class="actions">
                    <button class="btn" onclick="goTo('createPoll')">Создать опрос</button>
                </div>
            `;
            if (polls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет созданных опросов</p>';
            } else {
                polls.forEach(poll => {
                    html += `
                        <div class="card">
                            <strong>${escapeHtml(poll.title)}</strong>
                            <span style="color:${poll.status==='active'?'#2d7d46':'#c73e3e'};font-weight:500;">(${poll.status==='active'?'Активен':'Завершён'})</span>
                            <br>
                            <button class="btn" onclick="goTo('statistics','${poll.id}')">Статистика</button>
                            <button class="btn" onclick="goTo('editPoll','${poll.id}')">Редактировать</button>
                            <button class="btn" onclick="togglePoll('${poll.id}')">${poll.status==='active'?'Завершить':'Активировать'}</button>
                            <button class="btn btn-red" onclick="deletePoll('${poll.id}')">Удалить</button>
                        </div>
                    `;
                });
            }
            return html;
        };

        window.togglePoll = async function(pollId) {
            const poll = DATA.polls.find(p => p.id === pollId);
            if (poll) {
                poll.status = poll.status === 'active' ? 'closed' : 'active';
                await saveData();
                render();
            }
        };

        window.deletePoll = async function(pollId) {
            if (confirm('Удалить опрос и все связанные данные?')) {
                const questionIds = DATA.questions.filter(q => q.pollId === pollId).map(q => q.id);
                DATA.polls = DATA.polls.filter(p => p.id !== pollId);
                DATA.questions = DATA.questions.filter(q => q.pollId !== pollId);
                DATA.options = DATA.options.filter(o => !questionIds.includes(o.questionId));
                DATA.answers = DATA.answers.filter(a => a.pollId !== pollId);
                await saveData();
                render();
            }
        };

        // ====== СОЗДАНИЕ ОПРОСА ======
        function renderCreatePoll() {
            window._qCounter = 0;
            window._optCounters = {};
            return `
                <div class="header">
                    <button class="btn btn-gray" onclick="goTo('adminDashboard')">← Назад</button>
                </div>
                <h2>Создание опроса</h2>
                <input type="text" id="pollTitle" placeholder="Название опроса">
                <textarea id="pollDesc" placeholder="Описание"></textarea>
                <div id="questionsArea"></div>
                <div class="actions">
                    <button class="btn" onclick="addQuestion()">Добавить вопрос</button>
                    <button class="btn btn-green" onclick="savePoll()">Сохранить опрос</button>
                </div>
            `;
        };

        window.addQuestion = function() {
            window._qCounter++;
            const c = window._qCounter;
            const area = document.getElementById('questionsArea');
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = `qBlock${c}`;
            div.innerHTML = `
                <input type="text" id="qText${c}" placeholder="Текст вопроса">
                <select id="qType${c}" onchange="toggleOpts(${c})">
                    <option value="single">Одиночный выбор</option>
                    <option value="multiple">Множественный выбор</option>
                    <option value="text">Текстовый ответ</option>
                </select>
                <div id="optsArea${c}" style="margin-top:10px;">
                    <button class="btn" onclick="addOption(${c})">Добавить вариант</button>
                </div>
                <button class="btn btn-red" style="margin-top:10px;" onclick="this.parentElement.remove()">Удалить вопрос</button>
            `;
            area.appendChild(div);
        };

        window.toggleOpts = function(c) {
            document.getElementById(`optsArea${c}`).style.display = document.getElementById(`qType${c}`).value === 'text' ? 'none' : 'block';
        };

        window.addOption = function(c) {
            if (!window._optCounters[c]) window._optCounters[c] = 0;
            const i = window._optCounters[c]++;
            const letter = String.fromCharCode(65 + i);
            const area = document.getElementById(`optsArea${c}`);
            const div = document.createElement('div');
            div.className = 'option-row';
            div.innerHTML = `
                <span class="option-letter">${letter}</span>
                <input type="text" id="optText${c}_${i}" placeholder="Вариант ответа" style="flex:1;">
                <button class="btn btn-red" style="padding:5px 10px;" onclick="this.parentElement.remove()">×</button>
            `;
            area.insertBefore(div, area.lastElementChild);
        };

        window.savePoll = async function() {
            const title = document.getElementById('pollTitle').value.trim();
            if (!title) { alert('Введите название опроса'); return; }
            const desc = document.getElementById('pollDesc').value.trim();
            const pollId = generateId();
            DATA.polls.push({ id: pollId, title, description: desc, status: 'active', createdAt: new Date().toISOString() });
            document.querySelectorAll('[id^="qBlock"]').forEach(block => {
                const c = block.id.replace('qBlock', '');
                const qText = document.getElementById(`qText${c}`)?.value.trim();
                const qType = document.getElementById(`qType${c}`)?.value;
                if (!qText) return;
                const questionId = generateId();
                DATA.questions.push({ id: questionId, pollId, questionText: qText, questionType: qType });
                if (qType !== 'text') {
                    block.querySelectorAll('input[id^="optText"]').forEach((inp, i) => {
                        const optText = inp.value.trim();
                        if (optText) {
                            DATA.options.push({ id: generateId(), questionId, optionText: optText, optionLetter: String.fromCharCode(65 + i) });
                        }
                    });
                }
            });
            await saveData();
            alert('Опрос создан!');
            goTo('adminDashboard');
        };

        // ====== РЕДАКТИРОВАНИЕ ======
        function renderEditPoll() {
            const poll = DATA.polls.find(p => p.id === window._editPollId);
            if (!poll) return '<p>Опрос не найден</p>';
            const questions = DATA.questions.filter(q => q.pollId === poll.id);
            let html = `
                <div class="header"><button class="btn btn-gray" onclick="goTo('adminDashboard')">← Назад</button></div>
                <h2>Редактирование опроса</h2>
                <input type="text" id="editTitle" value="${escapeHtml(poll.title)}">
                <textarea id="editDesc">${escapeHtml(poll.description || '')}</textarea>
                <div id="editQuestionsArea">
            `;
            questions.forEach(q => {
                const opts = DATA.options.filter(o => o.questionId === q.id);
                html += `<div class="question-block">
                    <input type="text" value="${escapeHtml(q.questionText)}" data-qid="${q.id}" class="eqt" style="margin-bottom:8px;">
                    <select data-qid="${q.id}" class="eqty">
                        <option value="single" ${q.questionType==='single'?'selected':''}>Одиночный</option>
                        <option value="multiple" ${q.questionType==='multiple'?'selected':''}>Множественный</option>
                        <option value="text" ${q.questionType==='text'?'selected':''}>Текст</option>
                    </select>`;
                opts.forEach(opt => {
                    html += `<div class="option-row"><span class="option-letter">${opt.optionLetter}</span><input type="text" value="${escapeHtml(opt.optionText)}" data-oid="${opt.id}" class="eot" style="flex:1;"></div>`;
                });
                html += `<button class="btn btn-red" style="margin-top:10px;" onclick="deleteQuestion('${q.id}')">Удалить вопрос</button></div>`;
            });
            html += `</div><div class="actions"><button class="btn btn-green" onclick="saveEdit('${poll.id}')">Сохранить изменения</button></div>`;
            return html;
        };

        window.deleteQuestion = async function(qid) {
            if (confirm('Удалить вопрос и все ответы на него?')) {
                DATA.questions = DATA.questions.filter(q => q.id !== qid);
                DATA.options = DATA.options.filter(o => o.questionId !== qid);
                DATA.answers = DATA.answers.filter(a => a.questionId !== qid);
                await saveData();
                render();
            }
        };

        window.saveEdit = async function(pollId) {
            const poll = DATA.polls.find(p => p.id === pollId);
            if (poll) { poll.title = document.getElementById('editTitle').value.trim(); poll.description = document.getElementById('editDesc').value.trim(); }
            document.querySelectorAll('.eqt').forEach(inp => { const q = DATA.questions.find(q => q.id === inp.dataset.qid); if (q) q.questionText = inp.value.trim(); });
            document.querySelectorAll('.eqty').forEach(sel => { const q = DATA.questions.find(q => q.id === sel.dataset.qid); if (q) q.questionType = sel.value; });
            document.querySelectorAll('.eot').forEach(inp => { const o = DATA.options.find(o => o.id === inp.dataset.oid); if (o) o.optionText = inp.value.trim(); });
            await saveData();
            alert('Изменения сохранены!');
            goTo('adminDashboard');
        };

        // ====== СТАТИСТИКА ======
        function renderStatistics() {
            const pollId = window._statPollId;
            const poll = DATA.polls.find(p => p.id === pollId);
            if (!poll) return '<p>Опрос не найден</p>';
            const questions = DATA.questions.filter(q => q.pollId === pollId);
            const answers = DATA.answers.filter(a => a.pollId === pollId);
            let html = `
                <div class="header">
                    <button class="btn btn-gray" onclick="goTo('adminDashboard')">← Назад</button>
                    <button class="btn btn-green" onclick="exportCSV('${pollId}')">Экспорт в Excel</button>
                </div>
                <h2>${escapeHtml(poll.title)}</h2>
                <p style="text-align:center;color:#555;margin-bottom:20px;">Всего ответов: <strong>${answers.length}</strong></p>
            `;
            questions.forEach((q, qi) => {
                html += `<div class="card"><h3 style="color:#1a3e72;margin-bottom:10px;">${qi+1}. ${escapeHtml(q.questionText)}</h3>`;
                if (q.questionType === 'text') {
                    const ta = answers.filter(a => a.questionId === q.id && a.textAnswer);
                    html += ta.length ? '<ul style="padding-left:20px;">' + ta.map(a => `<li style="margin:5px 0;">${escapeHtml(a.textAnswer)}</li>`).join('') + '</ul>' : '<p style="color:#999;">Нет ответов</p>';
                } else {
                    const opts = DATA.options.filter(o => o.questionId === q.id);
                    const qa = answers.filter(a => a.questionId === q.id);
                    const total = qa.length;
                    const counts = {};
                    opts.forEach(o => { counts[o.id] = { letter: o.optionLetter, text: o.optionText, count: 0 }; });
                    qa.forEach(a => { if (counts[a.optionId]) counts[a.optionId].count++; });
                    html += `<table class="stat-table"><tr><th>Вар</th><th>Текст</th><th>Кол-во</th><th>%</th></tr>`;
                    Object.values(counts).forEach(v => {
                        const pct = total > 0 ? Math.round(v.count / total * 100) : 0;
                        html += `<tr><td><strong>${v.letter}</strong></td><td>${escapeHtml(v.text)}</td><td>${v.count}</td><td>${pct}%</td></tr>`;
                    });
                    html += '</table><canvas id="chart' + qi + '" height="200"></canvas>';
                    setTimeout(() => {
                        const ctx = document.getElementById('chart' + qi);
                        if (ctx) new Chart(ctx, { type: 'bar', data: { labels: Object.values(counts).map(v => v.letter), datasets: [{ label: 'Ответы', data: Object.values(counts).map(v => v.count), backgroundColor: '#1a3e72' }] }, options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } } });
                    }, 100);
                }
                html += '</div>';
            });
            return html;
        };

        window.exportCSV = function(pollId) {
            const poll = DATA.polls.find(p => p.id === pollId);
            const questions = DATA.questions.filter(q => q.pollId === pollId);
            const answers = DATA.answers.filter(a => a.pollId === pollId);
            let csv = '\uFEFF' + poll.title + '\n';
            questions.forEach(q => {
                csv += '\n' + q.questionText + '\n';
                if (q.questionType === 'text') {
                    csv += 'Ответ\n';
                    answers.filter(a => a.questionId === q.id && a.textAnswer).forEach(a => { csv += a.textAnswer + '\n'; });
                } else {
                    csv += 'Вариант;Текст;Количество;Процент\n';
                    const opts = DATA.options.filter(o => o.questionId === q.id);
                    const qa = answers.filter(a => a.questionId === q.id);
                    const total = qa.length;
                    opts.forEach(o => {
                        const cnt = qa.filter(a => a.optionId === o.id).length;
                        csv += `${o.optionLetter};${o.optionText};${cnt};${total>0?Math.round(cnt/total*100):0}%\n`;
                    });
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `опрос_${pollId}_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // ====== ВСПОМОГАТЕЛЬНЫЕ ======
        window.logout = function() {
            currentUser = null;
            currentScreen = 'login';
            window._pollId = null;
            window._statPollId = null;
            window._editPollId = null;
            render();
        };

        window.goTo = function(screen, param) {
            currentScreen = screen;
            if (screen === 'statistics') window._statPollId = param;
            if (screen === 'editPoll') window._editPollId = param;
            if (screen === 'takePoll') window._pollId = param;
            render();
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ====== ЗАПУСК ======
        (async function() {
            await loadData();
            render();
        })();
    </script>
</body>
</html>
