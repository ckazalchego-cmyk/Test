<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросник ДВССК</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { width: 100%; max-width: 800px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; }
        .header-bar { background: linear-gradient(180deg, #1a3e72 0%, #0d2b54 100%); padding: 20px; text-align: center; color: #fff; }
        .header-bar h1 { font-size: 22px; font-weight: 600; }
        .content { padding: 30px; }
        h2 { color: #1a3e72; margin-bottom: 15px; font-size: 20px; font-weight: 600; text-align: center; }
        .subtitle { text-align: center; color: #555; margin-bottom: 25px; font-size: 14px; }
        .btn { display: inline-block; padding: 10px 20px; background: #00509e; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; margin: 5px; font-weight: 500; }
        .btn:hover { background: #003d7a; }
        .btn-green { background: #2d7d46; } .btn-green:hover { background: #236636; }
        .btn-red { background: #c73e3e; } .btn-red:hover { background: #a33030; }
        .btn-gray { background: #5a6268; } .btn-gray:hover { background: #464c51; }
        input, textarea, select { width: 100%; padding: 10px 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; background: #f8f9fa; }
        textarea { resize: vertical; min-height: 80px; }
        .card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 18px; margin: 12px 0; }
        .question-block { background: #fff; border: 1px solid #ced4da; border-radius: 6px; padding: 18px; margin: 12px 0; }
        .option-row { display: flex; align-items: center; margin: 10px 0; padding: 6px 8px; background: #f1f4f7; border-radius: 4px; }
        .option-letter { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: #1a3e72; color: #fff; border-radius: 50%; font-weight: bold; font-size: 14px; margin-right: 12px; flex-shrink: 0; }
        .stat-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        .stat-table th { background: #1a3e72; color: #fff; padding: 10px 12px; text-align: left; }
        .stat-table td { padding: 8px 12px; border: 1px solid #dee2e6; }
        .stat-table tr:nth-child(even) { background: #f8f9fa; }
        .error { color: #c73e3e; text-align: center; margin: 12px 0; font-weight: 500; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #dee2e6; }
        .hidden { display: none; }
        .actions { margin: 20px 0; text-align: center; }
        canvas { margin-top: 20px; max-height: 300px; }
        label { display: block; margin: 5px 0; cursor: pointer; }
        @media (max-width: 600px) { .header-bar h1 { font-size: 18px; } .content { padding: 20px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-bar"><h1>ДВССК · Опросник</h1></div>
        <div class="content" id="app"></div>
    </div>

    <script>
        // ====== НАСТРОЙКИ ======
        const FB_URL = 'https://oprosnik-2fff5-default-rtdb.europe-west1.firebasedatabase.app/.json';
        const ADMIN = { login: 'admin', password: 'admin123' };

        // ====== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ======
        let DATA = { polls: [], questions: [], options: [], answers: [] };
        let currentUser = null;
        let currentScreen = 'login';
        let selectedPollId = null;
        let selectedStatId = null;
        let selectedEditId = null;

        // ====== ГЕНЕРАТОР ID ======
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ====== ЗАГРУЗКА И СОХРАНЕНИЕ В FIREBASE ======
        async function loadData() {
            try {
                const response = await fetch(FB_URL);
                const data = await response.json();
                if (data && data.polls) {
                    DATA = data;
                } else {
                    DATA = { polls: [], questions: [], options: [], answers: [] };
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        async function saveData() {
            try {
                await fetch(FB_URL, {
                    method: 'PUT',
                    body: JSON.stringify(DATA)
                });
            } catch (error) {
                console.error('Ошибка сохранения:', error);
            }
        }

        // ====== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ======
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // ====== СМЕНА ЭКРАНА ======
        function goToScreen(screen, param) {
            currentScreen = screen;
            if (screen === 'takePoll') selectedPollId = param;
            if (screen === 'statistics') selectedStatId = param;
            if (screen === 'editPoll') selectedEditId = param;
            render();
        }

        // ====== ВЫХОД ======
        function logout() {
            currentUser = null;
            currentScreen = 'login';
            selectedPollId = null;
            selectedStatId = null;
            selectedEditId = null;
            render();
        }

        // ====== ГЛАВНЫЙ РЕНДЕР ======
        function render() {
            const app = document.getElementById('app');
            
            if (currentScreen === 'login') {
                app.innerHTML = `
                    <h2>Вход в систему</h2>
                    <p class="subtitle">Пользователь: любой логин. Админ: admin + пароль.</p>
                    <div id="loginError" class="error hidden"></div>
                    <input type="text" id="loginInput" placeholder="Логин">
                    <input type="password" id="passwordInput" placeholder="Пароль (только для админа)">
                    <div class="actions">
                        <button class="btn" id="loginBtn">Войти</button>
                    </div>
                `;
                document.getElementById('loginBtn').addEventListener('click', doLogin);
            }
            
            else if (currentScreen === 'userDashboard') {
                renderUserDashboard(app);
            }
            
            else if (currentScreen === 'takePoll') {
                renderTakePoll(app);
            }
            
            else if (currentScreen === 'adminDashboard') {
                renderAdminDashboard(app);
            }
            
            else if (currentScreen === 'createPoll') {
                renderCreatePoll(app);
            }
            
            else if (currentScreen === 'editPoll') {
                renderEditPoll(app);
            }
            
            else if (currentScreen === 'statistics') {
                renderStatistics(app);
            }
        }

        // ====== ЛОГИН ======
        function doLogin() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');

            if (!login) {
                errorDiv.textContent = 'Введите логин';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (login === ADMIN.login) {
                if (password === ADMIN.password) {
                    currentUser = { login: login, role: 'admin' };
                    currentScreen = 'adminDashboard';
                } else {
                    errorDiv.textContent = 'Неверный пароль администратора';
                    errorDiv.classList.remove('hidden');
                    return;
                }
            } else {
                currentUser = { login: login, role: 'user' };
                currentScreen = 'userDashboard';
            }

            errorDiv.classList.add('hidden');
            render();
        }

        // ====== ДАШБОРД ПОЛЬЗОВАТЕЛЯ ======
        function renderUserDashboard(app) {
            const activePolls = DATA.polls.filter(p => p.status === 'active');
            
            let html = `
                <div class="header">
                    <span>Пользователь: <strong>${escapeHtml(currentUser.login)}</strong></span>
                    <button class="btn btn-gray" id="logoutBtn">Выйти</button>
                </div>
                <h2>Доступные опросы</h2>
            `;

            if (activePolls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет активных опросов</p>';
            } else {
                activePolls.forEach(poll => {
                    html += `
                        <div class="card">
                            <strong>${escapeHtml(poll.title)}</strong>
                            <p style="color:#666;font-size:13px;margin-top:5px;">${escapeHtml(poll.description || '')}</p>
                            <button class="btn take-poll-btn" data-poll-id="${poll.id}">Пройти</button>
                        </div>
                    `;
                });
            }

            app.innerHTML = html;
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            document.querySelectorAll('.take-poll-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    goToScreen('takePoll', this.dataset.pollId);
                });
            });
        }

        // ====== ПРОХОЖДЕНИЕ ОПРОСА ======
        function renderTakePoll(app) {
            const poll = DATA.polls.find(p => p.id === selectedPollId);
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p>';
                return;
            }

            const questions = DATA.questions.filter(q => q.pollId === selectedPollId);
            
            let html = `
                <div class="header">
                    <button class="btn btn-gray" id="backToUserBtn">← Назад</button>
                </div>
                <h2>${escapeHtml(poll.title)}</h2>
                <p style="color:#555;margin-bottom:20px;">${escapeHtml(poll.description || '')}</p>
                <div id="pollError" class="error hidden"></div>
                <form id="pollForm">
            `;

            questions.forEach((q, index) => {
                html += `<div class="question-block">
                    <p style="font-weight:600;color:#1a3e72;margin-bottom:12px;">${index + 1}. ${escapeHtml(q.questionText)}</p>`;
                
                if (q.questionType === 'text') {
                    html += `<textarea name="answer_${q.id}" placeholder="Ваш ответ"></textarea>`;
                } else {
                    const options = DATA.options.filter(o => o.questionId === q.id);
                    const inputType = q.questionType === 'single' ? 'radio' : 'checkbox';
                    const name = q.questionType === 'single' ? `answer_${q.id}` : `answer_${q.id}[]`;
                    
                    options.forEach(opt => {
                        html += `
                            <label class="option-row">
                                <span class="option-letter">${opt.optionLetter}</span>
                                <input type="${inputType}" name="${name}" value="${opt.id}">
                                ${escapeHtml(opt.optionText)}
                            </label>
                        `;
                    });
                }
                
                html += '</div>';
            });

            html += `
                    <div class="actions">
                        <button type="button" class="btn btn-green" id="submitPollBtn">Отправить ответы</button>
                    </div>
                </form>
            `;

            app.innerHTML = html;
            
            document.getElementById('backToUserBtn').addEventListener('click', () => goToScreen('userDashboard'));
            document.getElementById('submitPollBtn').addEventListener('click', submitPoll);
        }

        async function submitPoll() {
            const questions = DATA.questions.filter(q => q.pollId === selectedPollId);
            let hasError = false;

            questions.forEach(q => {
                if (q.questionType === 'text') {
                    const el = document.querySelector(`[name="answer_${q.id}"]`);
                    if (!el || !el.value.trim()) hasError = true;
                } else if (q.questionType === 'single') {
                    if (!document.querySelector(`[name="answer_${q.id}"]:checked`)) hasError = true;
                } else if (q.questionType === 'multiple') {
                    if (document.querySelectorAll(`[name="answer_${q.id}\\[\\]"]:checked`).length === 0) hasError = true;
                }
            });

            if (hasError) {
                const errorDiv = document.getElementById('pollError');
                errorDiv.textContent = 'Ответьте на все вопросы';
                errorDiv.classList.remove('hidden');
                return;
            }

            questions.forEach(q => {
                if (q.questionType === 'text') {
                    const val = document.querySelector(`[name="answer_${q.id}"]`).value.trim();
                    DATA.answers.push({
                        id: generateId(),
                        pollId: selectedPollId,
                        questionId: q.id,
                        userLogin: currentUser.login,
                        optionId: null,
                        textAnswer: val,
                        submittedAt: new Date().toISOString()
                    });
                } else if (q.questionType === 'single') {
                    const checked = document.querySelector(`[name="answer_${q.id}"]:checked`);
                    DATA.answers.push({
                        id: generateId(),
                        pollId: selectedPollId,
                        questionId: q.id,
                        userLogin: currentUser.login,
                        optionId: checked.value,
                        textAnswer: null,
                        submittedAt: new Date().toISOString()
                    });
                } else if (q.questionType === 'multiple') {
                    document.querySelectorAll(`[name="answer_${q.id}\\[\\]"]:checked`).forEach(cb => {
                        DATA.answers.push({
                            id: generateId(),
                            pollId: selectedPollId,
                            questionId: q.id,
                            userLogin: currentUser.login,
                            optionId: cb.value,
                            textAnswer: null,
                            submittedAt: new Date().toISOString()
                        });
                    });
                }
            });

            await saveData();
            alert('Ответы приняты!');
            goToScreen('userDashboard');
        }

        // ====== АДМИН-ПАНЕЛЬ ======
        function renderAdminDashboard(app) {
            let html = `
                <div class="header">
                    <span>Администратор: <strong>${escapeHtml(currentUser.login)}</strong></span>
                    <button class="btn btn-gray" id="logoutBtn">Выйти</button>
                </div>
                <h2>Управление опросами</h2>
                <div class="actions">
                    <button class="btn" id="createPollBtn">Создать опрос</button>
                </div>
            `;

            if (DATA.polls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет опросов</p>';
            } else {
                DATA.polls.forEach(poll => {
                    const statusColor = poll.status === 'active' ? '#2d7d46' : '#c73e3e';
                    const statusText = poll.status === 'active' ? 'Активен' : 'Завершён';
                    const toggleText = poll.status === 'active' ? 'Завершить' : 'Активировать';
                    
                    html += `
                        <div class="card">
                            <strong>${escapeHtml(poll.title)}</strong>
                            <span style="color:${statusColor};font-weight:500;">(${statusText})</span>
                            <br>
                            <button class="btn stat-btn" data-poll-id="${poll.id}">Статистика</button>
                            <button class="btn edit-btn" data-poll-id="${poll.id}">Редактировать</button>
                            <button class="btn toggle-btn" data-poll-id="${poll.id}">${toggleText}</button>
                            <button class="btn btn-red delete-btn" data-poll-id="${poll.id}">Удалить</button>
                        </div>
                    `;
                });
            }

            app.innerHTML = html;
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('createPollBtn').addEventListener('click', () => goToScreen('createPoll'));
            
            document.querySelectorAll('.stat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    goToScreen('statistics', this.dataset.pollId);
                });
            });
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    goToScreen('editPoll', this.dataset.pollId);
                });
            });
            
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const poll = DATA.polls.find(p => p.id === this.dataset.pollId);
                    if (poll) {
                        poll.status = poll.status === 'active' ? 'closed' : 'active';
                        await saveData();
                        render();
                    }
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('Удалить опрос и все данные?')) {
                        const pollId = this.dataset.pollId;
                        const questionIds = DATA.questions.filter(q => q.pollId === pollId).map(q => q.id);
                        DATA.polls = DATA.polls.filter(p => p.id !== pollId);
                        DATA.questions = DATA.questions.filter(q => q.pollId !== pollId);
                        DATA.options = DATA.options.filter(o => !questionIds.includes(o.questionId));
                        DATA.answers = DATA.answers.filter(a => a.pollId !== pollId);
                        await saveData();
                        render();
                    }
                });
            });
        }

        // ====== СОЗДАНИЕ ОПРОСА ======
        function renderCreatePoll(app) {
            window.questionCounter = 0;
            window.optionCounters = {};
            
            app.innerHTML = `
                <div class="header">
                    <button class="btn btn-gray" id="backToAdminBtn">← Назад</button>
                </div>
                <h2>Создание опроса</h2>
                <input type="text" id="pollTitle" placeholder="Название опроса">
                <textarea id="pollDescription" placeholder="Описание"></textarea>
                <div id="questionsArea"></div>
                <div class="actions">
                    <button class="btn" id="addQuestionBtn">Добавить вопрос</button>
                    <button class="btn btn-green" id="savePollBtn">Сохранить опрос</button>
                </div>
            `;
            
            document.getElementById('backToAdminBtn').addEventListener('click', () => goToScreen('adminDashboard'));
            document.getElementById('addQuestionBtn').addEventListener('click', addQuestion);
            document.getElementById('savePollBtn').addEventListener('click', savePoll);
        }

        function addQuestion() {
            window.questionCounter++;
            const counter = window.questionCounter;
            const area = document.getElementById('questionsArea');
            
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = 'questionBlock' + counter;
            div.innerHTML = `
                <input type="text" id="questionText${counter}" placeholder="Текст вопроса">
                <select id="questionType${counter}" class="question-type-select" data-counter="${counter}">
                    <option value="single">Одиночный выбор</option>
                    <option value="multiple">Множественный выбор</option>
                    <option value="text">Текстовый ответ</option>
                </select>
                <div id="optionsArea${counter}" style="margin-top:10px;">
                    <button class="btn add-option-btn" data-counter="${counter}">Добавить вариант</button>
                </div>
                <button class="btn btn-red remove-question-btn" style="margin-top:10px;">Удалить вопрос</button>
            `;
            
            area.appendChild(div);
            
            div.querySelector('.question-type-select').addEventListener('change', function() {
                const c = this.dataset.counter;
                document.getElementById('optionsArea' + c).style.display = this.value === 'text' ? 'none' : 'block';
            });
            
            div.querySelector('.add-option-btn').addEventListener('click', function() {
                addOption(this.dataset.counter);
            });
            
            div.querySelector('.remove-question-btn').addEventListener('click', function() {
                div.remove();
            });
        }

        function addOption(counter) {
            if (!window.optionCounters[counter]) window.optionCounters[counter] = 0;
            const index = window.optionCounters[counter]++;
            const letter = String.fromCharCode(65 + index);
            const area = document.getElementById('optionsArea' + counter);
            
            const div = document.createElement('div');
            div.className = 'option-row';
            div.innerHTML = `
                <span class="option-letter">${letter}</span>
                <input type="text" class="option-input" data-counter="${counter}" placeholder="Вариант ответа" style="flex:1;">
                <button class="btn btn-red remove-option-btn" style="padding:5px 10px;">×</button>
            `;
            
            area.insertBefore(div, area.lastElementChild);
            
            div.querySelector('.remove-option-btn').addEventListener('click', function() {
                div.remove();
            });
        }

        async function savePoll() {
            const title = document.getElementById('pollTitle').value.trim();
            if (!title) {
                alert('Введите название опроса');
                return;
            }
            
            const pollId = generateId();
            DATA.polls.push({
                id: pollId,
                title: title,
                description: document.getElementById('pollDescription').value.trim(),
                status: 'active',
                createdAt: new Date().toISOString()
            });
            
            document.querySelectorAll('[id^="questionBlock"]').forEach(block => {
                const counter = block.id.replace('questionBlock', '');
                const questionText = document.getElementById('questionText' + counter)?.value.trim();
                const questionType = document.getElementById('questionType' + counter)?.value;
                
                if (!questionText) return;
                
                const questionId = generateId();
                DATA.questions.push({
                    id: questionId,
                    pollId: pollId,
                    questionText: questionText,
                    questionType: questionType
                });
                
                if (questionType !== 'text') {
                    const optionInputs = block.querySelectorAll('.option-input');
                    optionInputs.forEach((input, i) => {
                        const optionText = input.value.trim();
                        if (optionText) {
                            DATA.options.push({
                                id: generateId(),
                                questionId: questionId,
                                optionText: optionText,
                                optionLetter: String.fromCharCode(65 + i)
                            });
                        }
                    });
                }
            });
            
            await saveData();
            alert('Опрос создан!');
            goToScreen('adminDashboard');
        }

        // ====== РЕДАКТИРОВАНИЕ ОПРОСА ======
        function renderEditPoll(app) {
            const poll = DATA.polls.find(p => p.id === selectedEditId);
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p>';
                return;
            }
            
            const questions = DATA.questions.filter(q => q.pollId === selectedEditId);
            
            let html = `
                <div class="header">
                    <button class="btn btn-gray" id="backToAdminBtn">← Назад</button>
                </div>
                <h2>Редактирование опроса</h2>
                <input type="text" id="editTitle" value="${escapeHtml(poll.title)}">
                <textarea id="editDescription">${escapeHtml(poll.description || '')}</textarea>
                <div id="editQuestionsArea">
            `;
            
            questions.forEach(q => {
                html += `<div class="question-block">
                    <input type="text" value="${escapeHtml(q.questionText)}" data-question-id="${q.id}" class="edit-question-text" style="margin-bottom:8px;">
                    <select data-question-id="${q.id}" class="edit-question-type">
                        <option value="single" ${q.questionType === 'single' ? 'selected' : ''}>Одиночный</option>
                        <option value="multiple" ${q.questionType === 'multiple' ? 'selected' : ''}>Множественный</option>
                        <option value="text" ${q.questionType === 'text' ? 'selected' : ''}>Текст</option>
                    </select>`;
                
                const options = DATA.options.filter(o => o.questionId === q.id);
                options.forEach(opt => {
                    html += `<div class="option-row">
                        <span class="option-letter">${opt.optionLetter}</span>
                        <input type="text" value="${escapeHtml(opt.optionText)}" data-option-id="${opt.id}" class="edit-option-text" style="flex:1;">
                    </div>`;
                });
                
                html += `<button class="btn btn-red delete-question-btn" data-question-id="${q.id}" style="margin-top:10px;">Удалить вопрос</button></div>`;
            });
            
            html += `
                </div>
                <div class="actions">
                    <button class="btn btn-green" id="saveEditBtn">Сохранить изменения</button>
                </div>
            `;
            
            app.innerHTML = html;
            
            document.getElementById('backToAdminBtn').addEventListener('click', () => goToScreen('adminDashboard'));
            document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
            
            document.querySelectorAll('.delete-question-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('Удалить вопрос?')) {
                        const questionId = this.dataset.questionId;
                        DATA.questions = DATA.questions.filter(q => q.id !== questionId);
                        DATA.options = DATA.options.filter(o => o.questionId !== questionId);
                        DATA.answers = DATA.answers.filter(a => a.questionId !== questionId);
                        await saveData();
                        render();
                    }
                });
            });
        }

        async function saveEdit() {
            const poll = DATA.polls.find(p => p.id === selectedEditId);
            if (poll) {
                poll.title = document.getElementById('editTitle').value.trim();
                poll.description = document.getElementById('editDescription').value.trim();
            }
            
            document.querySelectorAll('.edit-question-text').forEach(input => {
                const question = DATA.questions.find(q => q.id === input.dataset.questionId);
                if (question) question.questionText = input.value.trim();
            });
            
            document.querySelectorAll('.edit-question-type').forEach(select => {
                const question = DATA.questions.find(q => q.id === select.dataset.questionId);
                if (question) question.questionType = select.value;
            });
            
            document.querySelectorAll('.edit-option-text').forEach(input => {
                const option = DATA.options.find(o => o.id === input.dataset.optionId);
                if (option) option.optionText = input.value.trim();
            });
            
            await saveData();
            alert('Изменения сохранены!');
            goToScreen('adminDashboard');
        }

        // ====== СТАТИСТИКА ======
        function renderStatistics(app) {
            const poll = DATA.polls.find(p => p.id === selectedStatId);
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p>';
                return;
            }
            
            const questions = DATA.questions.filter(q => q.pollId === selectedStatId);
            const answers = DATA.answers.filter(a => a.pollId === selectedStatId);
            
            let html = `
                <div class="header">
                    <button class="btn btn-gray" id="backToAdminBtn">← Назад</button>
                    <button class="btn btn-green" id="exportBtn">Экспорт в Excel</button>
                </div>
                <h2>${escapeHtml(poll.title)}</h2>
                <p style="text-align:center;color:#555;margin-bottom:20px;">Всего ответов: <strong>${answers.length}</strong></p>
            `;
            
            questions.forEach((q, index) => {
                html += `<div class="card"><h3 style="color:#1a3e72;margin-bottom:10px;">${index + 1}. ${escapeHtml(q.questionText)}</h3>`;
                
                if (q.questionType === 'text') {
                    const textAnswers = answers.filter(a => a.questionId === q.id && a.textAnswer);
                    if (textAnswers.length === 0) {
                        html += '<p style="color:#999;">Нет ответов</p>';
                    } else {
                        html += '<ul style="padding-left:20px;">';
                        textAnswers.forEach(a => {
                            html += `<li style="margin:5px 0;">${escapeHtml(a.textAnswer)}</li>`;
                        });
                        html += '</ul>';
                    }
                } else {
                    const options = DATA.options.filter(o => o.questionId === q.id);
                    const questionAnswers = answers.filter(a => a.questionId === q.id);
                    const total = questionAnswers.length;
                    const counts = {};
                    
                    options.forEach(o => {
                        counts[o.id] = {
                            letter: o.optionLetter,
                            text: o.optionText,
                            count: 0
                        };
                    });
                    
                    questionAnswers.forEach(a => {
                        if (counts[a.optionId]) {
                            counts[a.optionId].count++;
                        }
                    });
                    
                    html += `
                        <table class="stat-table">
                            <tr><th>Вар</th><th>Текст</th><th>Кол-во</th><th>%</th></tr>
                    `;
                    
                    Object.values(counts).forEach(v => {
                        const percent = total > 0 ? Math.round(v.count / total * 100) : 0;
                        html += `
                            <tr>
                                <td><strong>${v.letter}</strong></td>
                                <td>${escapeHtml(v.text)}</td>
                                <td>${v.count}</td>
                                <td>${percent}%</td>
                            </tr>
                        `;
                    });
                    
                    html += '</table>';
                    html += `<canvas id="chart${index}" height="200"></canvas>`;
                    
                    setTimeout(() => {
                        const ctx = document.getElementById('chart' + index);
                        if (ctx) {
                            new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: Object.values(counts).map(v => v.letter),
                                    datasets: [{
                                        label: 'Ответы',
                                        data: Object.values(counts).map(v => v.count),
                                        backgroundColor: '#1a3e72'
                                    }]
                                },
                                options: {
                                    scales: {
                                        y: {
                                            beginAtZero: true,
                                            ticks: { stepSize: 1 }
                                        }
                                    }
                                }
                            });
                        }
                    }, 100);
                }
                
                html += '</div>';
            });
            
            app.innerHTML = html;
            
            document.getElementById('backToAdminBtn').addEventListener('click', () => goToScreen('adminDashboard'));
            document.getElementById('exportBtn').addEventListener('click', exportToCSV);
        }

        function exportToCSV() {
            const poll = DATA.polls.find(p => p.id === selectedStatId);
            const questions = DATA.questions.filter(q => q.pollId === selectedStatId);
            const answers = DATA.answers.filter(a => a.pollId === selectedStatId);
            
            let csv = '\uFEFF' + poll.title + '\n';
            
            questions.forEach(q => {
                csv += '\n' + q.questionText + '\n';
                
                if (q.questionType === 'text') {
                    csv += 'Ответ\n';
                    answers.filter(a => a.questionId === q.id && a.textAnswer).forEach(a => {
                        csv += a.textAnswer + '\n';
                    });
                } else {
                    csv += 'Вариант;Текст;Количество;Процент\n';
                    const options = DATA.options.filter(o => o.questionId === q.id);
                    const questionAnswers = answers.filter(a => a.questionId === q.id);
                    const total = questionAnswers.length;
                    
                    options.forEach(o => {
                        const count = questionAnswers.filter(a => a.optionId === o.id).length;
                        const percent = total > 0 ? Math.round(count / total * 100) : 0;
                        csv += `${o.optionLetter};${o.optionText};${count};${percent}%\n`;
                    });
                }
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `опрос_${selectedStatId}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ====== ЗАПУСК ПРИЛОЖЕНИЯ ======
        (async function() {
            await loadData();
            render();
        })();
    </script>
