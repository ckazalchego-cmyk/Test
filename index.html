<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросник ДВССК</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { width: 100%; max-width: 800px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; }
        .header-bar { background: linear-gradient(180deg, #1a3e72 0%, #0d2b54 100%); padding: 20px; text-align: center; color: #fff; }
        .header-bar h1 { font-size: 22px; font-weight: 600; }
        .content { padding: 30px; }
        h2 { color: #1a3e72; margin-bottom: 15px; font-size: 20px; font-weight: 600; text-align: center; }
        .subtitle { text-align: center; color: #555; margin-bottom: 25px; font-size: 14px; }
        .btn { display: inline-block; padding: 10px 20px; background: #00509e; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; margin: 5px; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: #003d7a; }
        .btn-green { background: #2d7d46; } .btn-green:hover { background: #236636; }
        .btn-red { background: #c73e3e; } .btn-red:hover { background: #a33030; }
        .btn-gray { background: #5a6268; } .btn-gray:hover { background: #464c51; }
        input, textarea, select { width: 100%; padding: 10px 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; background: #f8f9fa; }
        textarea { resize: vertical; min-height: 80px; }
        .card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 18px; margin: 12px 0; }
        .question-block { background: #fff; border: 1px solid #ced4da; border-radius: 6px; padding: 18px; margin: 12px 0; }
        .option-row { display: flex; align-items: center; margin: 10px 0; padding: 6px 8px; background: #f1f4f7; border-radius: 4px; }
        .option-letter { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: #1a3e72; color: #fff; border-radius: 50%; font-weight: bold; font-size: 14px; margin-right: 12px; flex-shrink: 0; }
        .stat-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        .stat-table th { background: #1a3e72; color: #fff; padding: 10px 12px; text-align: left; }
        .stat-table td { padding: 8px 12px; border: 1px solid #dee2e6; }
        .stat-table tr:nth-child(even) { background: #f8f9fa; }
        .error { color: #c73e3e; text-align: center; margin: 12px 0; font-weight: 500; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #dee2e6; }
        .hidden { display: none; }
        .actions { margin: 20px 0; text-align: center; }
        canvas { margin-top: 20px; max-height: 300px; }
        label { display: block; margin: 5px 0; cursor: pointer; }
        @media (max-width: 600px) { .header-bar h1 { font-size: 18px; } .content { padding: 20px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-bar"><h1>ДВССК · Опросник</h1></div>
        <div class="content" id="app"></div>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ
        // ==========================================
        var FB_URL = 'https://oprosnik-2fff5-default-rtdb.europe-west1.firebasedatabase.app/.json';
        
        // ==========================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ==========================================
        var DATA = { polls: [], questions: [], options: [], answers: [] };
        var currentUser = null;
        var currentScreen = 'login';
        var selectedPollId = null;
        var selectedStatId = null;
        var selectedEditId = null;
        var questionCounter = 0;
        var optionCounters = {};

        // ==========================================
        // УТИЛИТЫ
        // ==========================================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadData() {
            try {
                var response = await fetch(FB_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                var data = await response.json();
                
                if (data && typeof data === 'object') {
                    DATA.polls = data.polls || [];
                    DATA.questions = data.questions || [];
                    DATA.options = data.options || [];
                    DATA.answers = data.answers || [];
                } else {
                    DATA = { polls: [], questions: [], options: [], answers: [] };
                    await saveData(); 
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('Не удалось подключиться к базе данных. Проверьте интернет.');
            }
        }

        async function saveData() {
            try {
                await fetch(FB_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(DATA)
                });
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка сохранения данных');
            }
        }

        function goToScreen(screen, param) {
            currentScreen = screen;
            if (screen === 'takePoll') selectedPollId = param;
            if (screen === 'statistics') selectedStatId = param;
            if (screen === 'editPoll') selectedEditId = param;
            render();
        }

        function logoutUser() {
            currentUser = null;
            currentScreen = 'login';
            selectedPollId = null;
            selectedStatId = null;
            selectedEditId = null;
            render();
        }

        function render() {
            var app = document.getElementById('app');
            app.innerHTML = '';
            
            if (currentScreen === 'login') {
                renderLogin(app);
            } else if (currentScreen === 'userDashboard') {
                renderUserDashboard(app);
            } else if (currentScreen === 'takePoll') {
                renderTakePoll(app);
            } else if (currentScreen === 'adminDashboard') {
                renderAdminDashboard(app);
            } else if (currentScreen === 'createPoll') {
                renderCreatePoll(app);
            } else if (currentScreen === 'editPoll') {
                renderEditPoll(app);
            } else if (currentScreen === 'statistics') {
                renderStatistics(app);
            }
        }

        function renderLogin(app) {
            var html = '';
            html += '<h2>Вход в систему</h2>';
            html += '<p class="subtitle">Пользователь: введите любой логин. Администратор: admin + пароль.</p>';
            html += '<div id="loginError" class="error hidden"></div>';
            html += '<input type="text" id="loginInput" placeholder="Логин">';
            html += '<input type="password" id="passwordInput" placeholder="Пароль (только для администратора)">';
            html += '<div class="actions">';
            html += '<button class="btn" onclick="handleLogin()">Войти</button>';
            html += '</div>';
            
            app.innerHTML = html;
            
            document.getElementById('passwordInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') handleLogin();
            });
        }

        function handleLogin() {
            var loginInput = document.getElementById('loginInput');
            var passwordInput = document.getElementById('passwordInput');
            var errorDiv = document.getElementById('loginError');
            
            var login = loginInput.value.trim();
            var password = passwordInput.value;
            
            if (!login) {
                errorDiv.textContent = 'Введите логин';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (login === 'admin') {
                if (password === 'admin123') {
                    currentUser = { login: login, role: 'admin' };
                    currentScreen = 'adminDashboard';
                } else {
                    errorDiv.textContent = 'Неверный пароль администратора';
                    errorDiv.classList.remove('hidden');
                    return;
                }
            } else {
                currentUser = { login: login, role: 'user' };
                currentScreen = 'userDashboard';
            }
            
            errorDiv.classList.add('hidden');
            render();
        }

        function renderUserDashboard(app) {
            var activePolls = DATA.polls.filter(function(p) {
                return p.status === 'active';
            });
            
            var html = '';
            html += '<div class="header">';
            html += '<span>Пользователь: <strong>' + escapeHtml(currentUser.login) + '</strong></span>';
            html += '<button class="btn btn-gray" onclick="logoutUser()">Выйти</button>';
            html += '</div>';
            html += '<h2>Доступные опросы</h2>';
            
            if (activePolls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет активных опросов</p>';
            } else {
                for (var i = 0; i < activePolls.length; i++) {
                    var poll = activePolls[i];
                    html += '<div class="card">';
                    html += '<strong>' + escapeHtml(poll.title) + '</strong>';
                    html += '<p style="color:#666;font-size:13px;margin-top:5px;">' + escapeHtml(poll.description || '') + '</p>';
                    html += '<button class="btn" onclick="handleTakePoll(\'' + poll.id + '\')">Пройти</button>';
                    html += '</div>';
                }
            }
            
            app.innerHTML = html;
        }

        function handleTakePoll(pollId) {
            selectedPollId = pollId;
            currentScreen = 'takePoll';
            render();
        }

        function renderTakePoll(app) {
            var poll = DATA.polls.find(function(p) { return p.id === selectedPollId; });
            
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p><button class="btn" onclick="goToScreen(\'userDashboard\')">Назад</button>';
                return;
            }
            
            var questions = DATA.questions.filter(function(q) { return q.pollId === selectedPollId; });
            
            var html = '';
            html += '<div class="header">';
            html += '<button class="btn btn-gray" onclick="goToScreen(\'userDashboard\')">← Назад</button>';
            html += '</div>';
            html += '<h2>' + escapeHtml(poll.title) + '</h2>';
            html += '<p style="color:#555;margin-bottom:20px;">' + escapeHtml(poll.description || '') + '</p>';
            html += '<div id="pollError" class="error hidden"></div>';
            
            if (questions.length === 0) {
                html += '<p>В этом опросе пока нет вопросов.</p>';
            } else {
                for (var i = 0; i < questions.length; i++) {
                    var q = questions[i];
                    html += '<div class="question-block">';
                    html += '<p style="font-weight:600;color:#1a3e72;margin-bottom:12px;">' + (i + 1) + '. ' + escapeHtml(q.questionText) + '</p>';
                    
                    if (q.questionType === 'text') {
                        html += '<textarea id="answer_' + q.id + '" placeholder="Ваш ответ"></textarea>';
                    } else {
                        var options = DATA.options.filter(function(o) { return o.questionId === q.id; });
                        var inputType = q.questionType === 'single' ? 'radio' : 'checkbox';
                        var inputName = q.questionType === 'single' ? 'answer_' + q.id : 'answer_' + q.id + '[]';
                        
                        if (options.length === 0) {
                            html += '<p style="color:#999; font-style:italic;">Нет вариантов ответа</p>';
                        } else {
                            for (var j = 0; j < options.length; j++) {
                                var opt = options[j];
                                html += '<label class="option-row">';
                                html += '<span class="option-letter">' + opt.optionLetter + '</span>';
                                html += '<input type="' + inputType + '" name="' + inputName + '" value="' + opt.id + '">';
                                html += escapeHtml(opt.optionText);
                                html += '</label>';
                            }
                        }
                    }
                    
                    html += '</div>';
                }
                
                html += '<div class="actions">';
                html += '<button class="btn btn-green" onclick="handleSubmitPoll()">Отправить ответы</button>';
                html += '</div>';
            }
            
            app.innerHTML = html;
        }

        async function handleSubmitPoll() {
            var questions = DATA.questions.filter(function(q) { return q.pollId === selectedPollId; });
            var hasError = false;
            
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                
                if (q.questionType === 'text') {
                    var textInput = document.getElementById('answer_' + q.id);
                    if (!textInput || !textInput.value.trim()) {
                        hasError = true;
                    }
                } else if (q.questionType === 'single') {
                    var radioChecked = document.querySelector('[name="answer_' + q.id + '"]:checked');
                    if (!radioChecked) {
                        hasError = true;
                    }
                } else if (q.questionType === 'multiple') {
                    var checkboxes = document.querySelectorAll('[name="answer_' + q.id + '\\[\\]"]:checked');
                    if (checkboxes.length === 0) {
                        hasError = true;
                    }
                }
            }
            
            if (hasError) {
                var errorDiv = document.getElementById('pollError');
                errorDiv.textContent = 'Пожалуйста, ответьте на все вопросы';
                errorDiv.classList.remove('hidden');
                window.scrollTo(0, 0);
                return;
            }
            
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                
                if (q.questionType === 'text') {
                    var textValue = document.getElementById('answer_' + q.id).value.trim();
                    DATA.answers.push({
                        id: generateId(),
                        pollId: selectedPollId,
                        questionId: q.id,
                        userLogin: currentUser.login,
                        optionId: null,
                        textAnswer: textValue,
                        submittedAt: new Date().toISOString()
                    });
                } else if (q.questionType === 'single') {
                    var checkedRadio = document.querySelector('[name="answer_' + q.id + '"]:checked');
                    if (checkedRadio) {
                        DATA.answers.push({
                            id: generateId(),
                            pollId: selectedPollId,
                            questionId: q.id,
                            userLogin: currentUser.login,
                            optionId: checkedRadio.value,
                            textAnswer: null,
                            submittedAt: new Date().toISOString()
                        });
                    }
                } else if (q.questionType === 'multiple') {
                    var checkedBoxes = document.querySelectorAll('[name="answer_' + q.id + '\\[\\]"]:checked');
                    for (var j = 0; j < checkedBoxes.length; j++) {
                        DATA.answers.push({
                            id: generateId(),
                            pollId: selectedPollId,
                            questionId: q.id,
                            userLogin: currentUser.login,
                            optionId: checkedBoxes[j].value,
                            textAnswer: null,
                            submittedAt: new Date().toISOString()
                        });
                    }
                }
            }
            
            await saveData();
            alert('Ответы приняты! Спасибо за участие.');
            goToScreen('userDashboard');
        }

        function renderAdminDashboard(app) {
            var html = '';
            html += '<div class="header">';
            html += '<span>Администратор: <strong>' + escapeHtml(currentUser.login) + '</strong></span>';
            html += '<button class="btn btn-gray" onclick="logoutUser()">Выйти</button>';
            html += '</div>';
            html += '<h2>Управление опросами</h2>';
            html += '<div class="actions">';
            html += '<button class="btn" onclick="goToScreen(\'createPoll\')">Создать новый опрос</button>';
            html += '</div>';
            
            if (DATA.polls.length === 0) {
                html += '<p style="text-align:center;color:#999;">Нет созданных опросов</p>';
            } else {
                var sortedPolls = DATA.polls.slice().sort(function(a, b) {
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });

                for (var i = 0; i < sortedPolls.length; i++) {
                    var poll = sortedPolls[i];
                    var statusColor = poll.status === 'active' ? '#2d7d46' : '#c73e3e';
                    var statusText = poll.status === 'active' ? 'Активен' : 'Завершён';
                    var toggleText = poll.status === 'active' ? 'Завершить' : 'Активировать';
                    
                    html += '<div class="card">';
                    html += '<strong>' + escapeHtml(poll.title) + '</strong> ';
                    html += '<span style="color:' + statusColor + ';font-weight:500; font-size: 0.9em;">(' + statusText + ')</span>';
                    html += '<br>';
                    html += '<button class="btn" onclick="handleShowStats(\'' + poll.id + '\')">Статистика</button> ';
                    html += '<button class="btn" onclick="handleEditPoll(\'' + poll.id + '\')">Редактировать</button> ';
                    html += '<button class="btn" onclick="handleTogglePoll(\'' + poll.id + '\')">' + toggleText + '</button> ';
                    html += '<button class="btn btn-red" onclick="handleDeletePoll(\'' + poll.id + '\')">Удалить</button>';
                    html += '</div>';
                }
            }
            
            app.innerHTML = html;
        }

        function handleShowStats(pollId) {
            selectedStatId = pollId;
            currentScreen = 'statistics';
            render();
        }

        function handleEditPoll(pollId) {
            selectedEditId = pollId;
            currentScreen = 'editPoll';
            render();
        }

        async function handleTogglePoll(pollId) {
            var poll = DATA.polls.find(function(p) { return p.id === pollId; });
            if (poll) {
                poll.status = poll.status === 'active' ? 'closed' : 'active';
                await saveData();
                render();
            }
        }

        async function handleDeletePoll(pollId) {
            if (confirm('Вы уверены, что хотите удалить этот опрос и все связанные данные? Это действие нельзя отменить.')) {
                var questionIds = DATA.questions.filter(function(q) { return q.pollId === pollId; }).map(function(q) { return q.id; });
                
                DATA.polls = DATA.polls.filter(function(p) { return p.id !== pollId; });
                DATA.questions = DATA.questions.filter(function(q) { return q.pollId !== pollId; });
                DATA.options = DATA.options.filter(function(o) { return questionIds.indexOf(o.questionId) === -1; });
                DATA.answers = DATA.answers.filter(function(a) { return a.pollId !== pollId; });
                
                await saveData();
                render();
            }
        }

        function renderCreatePoll(app) {
            questionCounter = 0;
            optionCounters = {};
            
            var html = '';
            html += '<div class="header">';
            html += '<button class="btn btn-gray" onclick="goToScreen(\'adminDashboard\')">← Назад</button>';
            html += '</div>';
            html += '<h2>Создание нового опроса</h2>';
            html += '<input type="text" id="pollTitle" placeholder="Название опроса">';
            html += '<textarea id="pollDescription" placeholder="Описание опроса"></textarea>';
            html += '<div id="questionsContainer"></div>';
            html += '<div class="actions">';
            html += '<button class="btn" onclick="handleAddQuestion()">Добавить вопрос</button> ';
            html += '<button class="btn btn-green" onclick="handleSavePoll()">Сохранить опрос</button>';
            html += '</div>';
            
            app.innerHTML = html;
        }

        function handleAddQuestion() {
            questionCounter++;
            var counter = questionCounter;
            var container = document.getElementById('questionsContainer');
            
            var questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';
            questionBlock.id = 'questionBlock' + counter;
            
            var blockHtml = '';
            blockHtml += '<input type="text" id="questionText' + counter + '" placeholder="Текст вопроса">';
            blockHtml += '<select id="questionType' + counter + '" onchange="handleQuestionTypeChange(' + counter + ')">';
            blockHtml += '<option value="single">Одиночный выбор</option>';
            blockHtml += '<option value="multiple">Множественный выбор</option>';
            blockHtml += '<option value="text">Текстовый ответ</option>';
            blockHtml += '</select>';
            blockHtml += '<div id="optionsContainer' + counter + '" style="margin-top:10px;"></div>';
            blockHtml += '<button class="btn" onclick="handleAddOption(' + counter + ')" id="addOptionBtn' + counter + '">Добавить вариант ответа</button>';
            blockHtml += '<button class="btn btn-red" onclick="handleRemoveQuestion(' + counter + ')" style="margin-top:10px;">Удалить вопрос</button>';
            
            questionBlock.innerHTML = blockHtml;
            container.appendChild(questionBlock);
            
            optionCounters[counter] = 0;
            
            handleAddOption(counter);
            handleAddOption(counter);
        }

        function handleQuestionTypeChange(counter) {
            var typeSelect = document.getElementById('questionType' + counter);
            var optionsContainer = document.getElementById('optionsContainer' + counter);
            var addOptionBtn = document.getElementById('addOptionBtn' + counter);
            
            if (typeSelect.value === 'text') {
                optionsContainer.style.display = 'none';
                addOptionBtn.style.display = 'none';
            } else {
                optionsContainer.style.display = 'block';
                addOptionBtn.style.display = 'inline-block';
            }
        }

        function handleAddOption(counter) {
            var optionsContainer = document.getElementById('optionsContainer' + counter);
            var optionIndex = optionCounters[counter];
            optionCounters[counter]++;
            
            var letter = String.fromCharCode(65 + optionIndex);
            
            var optionRow = document.createElement('div');
            optionRow.className = 'option-row';
            optionRow.id = 'optionRow' + counter + '_' + optionIndex;
            
            var rowHtml = '';
            rowHtml += '<span class="option-letter">' + letter + '</span>';
            rowHtml += '<input type="text" id="optionText' + counter + '_' + optionIndex + '" placeholder="Вариант ответа ' + letter + '" style="flex:1;">';
            rowHtml += '<button class="btn btn-red" onclick="handleRemoveOption(\'' + counter + '_' + optionIndex + '\')" style="padding:5px 10px;">×</button>';
            
            optionRow.innerHTML = rowHtml;
            optionsContainer.appendChild(optionRow);
        }

        function handleRemoveOption(optionId) {
            var optionRow = document.getElementById('optionRow' + optionId);
            if (optionRow) {
                optionRow.remove();
            }
        }

        function handleRemoveQuestion(counter) {
            var questionBlock = document.getElementById('questionBlock' + counter);
            if (questionBlock) {
                questionBlock.remove();
            }
        }

        async function handleSavePoll() {
            var titleInput = document.getElementById('pollTitle');
            var descriptionInput = document.getElementById('pollDescription');
            
            var title = titleInput.value.trim();
            if (!title) {
                alert('Пожалуйста, введите название опроса');
                return;
            }
            
            var pollId = generateId();
            
            DATA.polls.push({
                id: pollId,
                title: title,
                description: descriptionInput.value.trim(),
                status: 'active',
                createdAt: new Date().toISOString()
            });
            
            var questionBlocks = document.querySelectorAll('#questionsContainer .question-block');
            
            for (var i = 0; i < questionBlocks.length; i++) {
                var block = questionBlocks[i];
                var blockId = block.id;
                var counter = blockId.replace('questionBlock', '');
                
                var questionTextInput = document.getElementById('questionText' + counter);
                var questionTypeInput = document.getElementById('questionType' + counter);
                
                if (!questionTextInput || !questionTextInput.value.trim()) {
                    continue;
                }
                
                var questionId = generateId();
                
                DATA.questions.push({
                    id: questionId,
                    pollId: pollId,
                    questionText: questionTextInput.value.trim(),
                    questionType: questionTypeInput.value
                });
                
                if (questionTypeInput.value !== 'text') {
                    var optionInputs = block.querySelectorAll('[id^="optionText' + counter + '_"]');
                    
                    for (var j = 0; j < optionInputs.length; j++) {
                        var optionTextInput = optionInputs[j];
                        var optionTextVal = optionTextInput.value.trim();
                        
                        if (optionTextVal) {
                            DATA.options.push({
                                id: generateId(),
                                questionId: questionId,
                                optionText: optionTextVal,
                                optionLetter: String.fromCharCode(65 + j)
                            });
                        }
                    }
                }
            }
            
            await saveData();
            alert('Опрос успешно создан!');
            goToScreen('adminDashboard');
        }

        function renderEditPoll(app) {
            var poll = DATA.polls.find(function(p) { return p.id === selectedEditId; });
            
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p><button class="btn" onclick="goToScreen(\'adminDashboard\')">Назад</button>';
                return;
            }
            
            var questions = DATA.questions.filter(function(q) { return q.pollId === selectedEditId; });
            
            var html = '';
            html += '<div class="header">';
            html += '<button class="btn btn-gray" onclick="goToScreen(\'adminDashboard\')">← Назад</button>';
            html += '</div>';
            html += '<h2>Редактирование опроса</h2>';
            html += '<input type="text" id="editTitle" value="' + escapeHtml(poll.title) + '">';
            html += '<textarea id="editDescription">' + escapeHtml(poll.description || '') + '</textarea>';
            html += '<div id="editQuestionsArea">';
            
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                var options = DATA.options.filter(function(o) { return o.questionId === q.id; });
                
                html += '<div class="question-block">';
                html += '<input type="text" value="' + escapeHtml(q.questionText) + '" data-question-id="' + q.id + '" class="edit-question-text" style="margin-bottom:8px;">';
                html += '<select data-question-id="' + q.id + '" class="edit-question-type">';
                html += '<option value="single"' + (q.questionType === 'single' ? ' selected' : '') + '>Одиночный выбор</option>';
                html += '<option value="multiple"' + (q.questionType === 'multiple' ? ' selected' : '') + '>Множественный выбор</option>';
                html += '<option value="text"' + (q.questionType === 'text' ? ' selected' : '') + '>Текстовый ответ</option>';
                html += '</select>';
                
                for (var j = 0; j < options.length; j++) {
                    var opt = options[j];
                    html += '<div class="option-row">';
                    html += '<span class="option-letter">' + opt.optionLetter + '</span>';
                    html += '<input type="text" value="' + escapeHtml(opt.optionText) + '" data-option-id="' + opt.id + '" class="edit-option-text" style="flex:1;">';
                    html += '</div>';
                }
                
                html += '<button class="btn btn-red" onclick="handleDeleteQuestion(\'' + q.id + '\')" style="margin-top:10px;">Удалить вопрос</button>';
                html += '</div>';
            }
            
            html += '</div>';
            html += '<div class="actions">';
            html += '<button class="btn btn-green" onclick="handleSaveEdit()">Сохранить изменения</button>';
            html += '</div>';
            
            app.innerHTML = html;
        }

        async function handleDeleteQuestion(questionId) {
            if (confirm('Вы уверены, что хотите удалить этот вопрос и все ответы на него?')) {
                DATA.questions = DATA.questions.filter(function(q) { return q.id !== questionId; });
                DATA.options = DATA.options.filter(function(o) { return o.questionId !== questionId; });
                DATA.answers = DATA.answers.filter(function(a) { return a.questionId !== questionId; });
                
                await saveData();
                render();
            }
        }

        async function handleSaveEdit() {
            var poll = DATA.polls.find(function(p) { return p.id === selectedEditId; });
            
            if (poll) {
                poll.title = document.getElementById('editTitle').value.trim();
                poll.description = document.getElementById('editDescription').value.trim();
            }
            
            var questionTextInputs = document.querySelectorAll('.edit-question-text');
            for (var i = 0; i < questionTextInputs.length; i++) {
                var input = questionTextInputs[i];
                var question = DATA.questions.find(function(q) { return q.id === input.dataset.questionId; });
                if (question) {
                    question.questionText = input.value.trim();
                }
            }
            
            var questionTypeSelects = document.querySelectorAll('.edit-question-type');
            for (var i = 0; i < questionTypeSelects.length; i++) {
                var select = questionTypeSelects[i];
                var question = DATA.questions.find(function(q) { return q.id === select.dataset.questionId; });
                if (question) {
                    question.questionType = select.value;
                }
            }
            
            var optionTextInputs = document.querySelectorAll('.edit-option-text');
            for (var i = 0; i < optionTextInputs.length; i++) {
                var input = optionTextInputs[i];
                var option = DATA.options.find(function(o) { return o.id === input.dataset.optionId; });
                if (option) {
                    option.optionText = input.value.trim();
                }
            }
            
            await saveData();
            alert('Изменения сохранены!');
            goToScreen('adminDashboard');
        }

        function renderStatistics(app) {
            var poll = DATA.polls.find(function(p) { return p.id === selectedStatId; });
            
            if (!poll) {
                app.innerHTML = '<p>Опрос не найден</p><button class="btn" onclick="goToScreen(\'adminDashboard\')">Назад</button>';
                return;
            }
            
            var questions = DATA.questions.filter(function(q) { return q.pollId === selectedStatId; });
            var answers = DATA.answers.filter(function(a) { return a.pollId === selectedStatId; });
            
            var html = '';
            html += '<div class="header">';
            html += '<button class="btn btn-gray" onclick="goToScreen(\'adminDashboard\')">← Назад</button>';
            html += '<button class="btn btn-green" onclick="handleExportCSV()">Экспорт в Excel</button>';
            html += '</div>';
            html += '<h2>' + escapeHtml(poll.title) + '</h2>';
            html += '<p style="text-align:center;color:#555;margin-bottom:20px;">Всего ответов: <strong>' + answers.length + '</strong></p>';
            
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                
                html += '<div class="card">';
                html += '<h3 style="color:#1a3e72;margin-bottom:10px;">' + (i + 1) + '. ' + escapeHtml(q.questionText) + '</h3>';
                
                if (q.questionType === 'text') {
                    var textAnswers = answers.filter(function(a) { return a.questionId === q.id && a.textAnswer; });
                    
                    if (textAnswers.length === 0) {
                        html += '<p style="color:#999;">Нет ответов</p>';
                    } else {
                        html += '<ul style="padding-left:20px;">';
                        for (var j = 0; j < textAnswers.length; j++) {
                            html += '<li style="margin:5px 0;">' + escapeHtml(textAnswers[j].textAnswer) + '</li>';
                        }
                        html += '</ul>';
                    }
                } else {
                    var options = DATA.options.filter(function(o) { return o.questionId === q.id; });
                    var questionAnswers = answers.filter(function(a) { return a.questionId === q.id; });
                    var total = questionAnswers.length;
                    
                    var counts = {};
                    for (var j = 0; j < options.length; j++) {
                        counts[options[j].id] = {
                            letter: options[j].optionLetter,
                            text: options[j].optionText,
                            count: 0
                        };
                    }
                    
                    for (var j = 0; j < questionAnswers.length; j++) {
                        if (counts[questionAnswers[j].optionId]) {
                            counts[questionAnswers[j].optionId].count++;
                        }
                    }
                    
                    html += '<table class="stat-table">';
                    html += '<tr><th>Вариант</th><th>Текст</th><th>Количество</th><th>Процент</th></tr>';
                    
                    var countValues = Object.values(counts);
                    for (var j = 0; j < countValues.length; j++) {
                        var v = countValues[j];
                        var percent = total > 0 ? Math.round(v.count / total * 100) : 0;
                        html += '<tr>';
                        html += '<td><strong>' + v.letter + '</strong></td>';
                        html += '<td>' + escapeHtml(v.text) + '</td>';
                        html += '<td>' + v.count + '</td>';
                        html += '<td>' + percent + '%</td>';
                        html += '</tr>';
                    }
                    
                    html += '</table>';
                    html += '<canvas id="chart' + i + '" data-index="' + i + '" height="200"></canvas>';
                }
                
                html += '</div>';
            }
            
            app.innerHTML = html;

            requestAnimationFrame(function() {
                var canvases = document.querySelectorAll('canvas[data-index]');
                canvases.forEach(function(canvas) {
                    var index = parseInt(canvas.getAttribute('data-index'));
                    var q = questions[index];
                    if (!q) return;

                    var options = DATA.options.filter(function(o) { return o.questionId === q.id; });
                    var questionAnswers = answers.filter(function(a) { return a.questionId === q.id; });
                    
                    var counts = [];
                    var labels = [];
                    
                    for(var k=0; k<options.length; k++) {
                        labels.push(options[k].optionLetter);
                        var count = questionAnswers.filter(function(a) { return a.optionId === options[k].id; }).length;
                        counts.push(count);
                    }

                    try {
                        new Chart(canvas, {
                            type: 'bar',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Количество ответов',
                                    data: counts,
                                    backgroundColor: '#1a3e72'
                                }]
                            },
                            options: {
                                responsive: true,
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: { stepSize: 1 }
                                    }
                                }
                            }
                        });
                    } catch(e) {
                        console.error("Chart error:", e);
                    }
                });
            });
        }

        function handleExportCSV() {
            var poll = DATA.polls.find(function(p) { return p.id === selectedStatId; });
            var questions = DATA.questions.filter(function(q) { return q.pollId === selectedStatId; });
            var answers = DATA.answers.filter(function(a) { return a.pollId === selectedStatId; });
            
            var csv = '\uFEFF' + poll.title + '\n';
            
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                
                csv += '\n' + q.questionText + '\n';
                
                if (q.questionType === 'text') {
                    csv += 'Ответ\n';
                    var textAnswers = answers.filter(function(a) { return a.questionId === q.id && a.textAnswer; });
                    for (var j = 0; j < textAnswers.length; j++) {
                        csv += textAnswers[j].textAnswer + '\n';
                    }
                } else {
                    csv += 'Вариант;Текст;Количество;Процент\n';
                    var options = DATA.options.filter(function(o) { return o.questionId === q.id; });
                    var questionAnswers = answers.filter(function(a) { return a.questionId === q.id; });
                    var total = questionAnswers.length;
                    
                    for (var j = 0; j < options.length; j++) {
                        var count = questionAnswers.filter(function(a) { return a.optionId === options[j].id; }).length;
                        var percent = total > 0 ? Math.round(count / total * 100) : 0;
                        csv += options[j].optionLetter + ';' + options[j].optionText + ';' + count + ';' + percent + '%\n';
                    }
                }
            }
            
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'опрос_' + selectedStatId + '_' + new Date().toISOString().slice(0, 10) + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        (async function() {
            await loadData();
            render();
        })();
    </script>
</body>
</html>
